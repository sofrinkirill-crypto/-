<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Расписание менеджеров ПБО</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #f5f5f7;
  --surface: #fff;
  --primary: #1d1d1f;
  --accent: #0071e3;
  --muted: #6e6e73;
  --border: #d2d2d7;
  --radius: 10px;
  --l5: #34C759;
  --l6: #FF9500;
  --l3: #007AFF;
}
body { font-family: -apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif; background:var(--bg); color:var(--primary); font-size:14px; }

/* ── Header ── */
.topbar { background:rgba(255,255,255,.85); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100;
  display:flex; align-items:center; gap:12px; padding:12px 20px; flex-wrap:wrap; }
.topbar h1 { font-size:16px; font-weight:600; margin-right:auto; }
.topbar select, .topbar button { font:inherit; }
select { border:1px solid var(--border); border-radius:8px; padding:6px 10px; background:var(--surface); cursor:pointer; }
.btn { border:none; border-radius:8px; padding:7px 16px; font-size:14px; font-weight:500; cursor:pointer; transition:.15s; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:#0077ed; }
.btn-secondary { background:var(--surface); color:var(--primary); border:1px solid var(--border); }
.btn-secondary:hover { background:var(--bg); }
.btn-danger { background:#ff3b30; color:#fff; }
.btn-sm { padding:4px 10px; font-size:12px; }
#status { font-size:13px; color:var(--muted); }

/* ── Layout ── */
.main { display:flex; gap:0; min-height:calc(100vh - 57px); }
.sidebar { width:260px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); padding:16px; overflow-y:auto; }
.content { flex:1; padding:20px; overflow-x:auto; }

/* ── Sidebar sections ── */
.section { margin-bottom:20px; }
.section h3 { font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:10px; }
.emp-list { display:flex; flex-direction:column; gap:6px; }
.emp-item { display:flex; align-items:center; gap:8px; padding:8px 10px; background:var(--bg); border-radius:8px; }
.emp-badge { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.emp-badge.level3 { background:var(--l3); }
.emp-badge.level5 { background:var(--l5); }
.emp-badge.level6 { background:var(--l6); }
.emp-name { flex:1; font-size:13px; font-weight:500; }
.emp-level { font-size:11px; color:var(--muted); }
.emp-del { margin-left:auto; background:none; border:none; cursor:pointer; color:#ff3b30; font-size:16px; line-height:1; padding:0 2px; opacity:.5; }
.emp-del:hover { opacity:1; }

/* Add employee form */
.add-form { display:flex; flex-direction:column; gap:6px; }
.add-form input, .add-form select { border:1px solid var(--border); border-radius:7px; padding:6px 9px; font:inherit; background:var(--surface); width:100%; }

/* Requests */
.req-form { display:flex; flex-direction:column; gap:6px; }
.req-form select, .req-form input { border:1px solid var(--border); border-radius:7px; padding:6px 9px; font:inherit; background:var(--surface); width:100%; }
.req-list { display:flex; flex-direction:column; gap:4px; margin-top:8px; max-height:180px; overflow-y:auto; }
.req-item { display:flex; align-items:center; gap:6px; font-size:12px; padding:5px 8px; background:var(--bg); border-radius:7px; }
.req-item .req-del { margin-left:auto; background:none; border:none; cursor:pointer; color:#ff3b30; font-size:14px; }
.req-tag { font-size:11px; padding:2px 6px; border-radius:4px; font-weight:600; }
.req-tag.off { background:#fff3cd; color:#856404; }
.req-tag.vacation { background:#d1ecf1; color:#0c5460; }

/* ── Schedule grid ── */
.schedule-wrap { min-width:900px; }
.schedule-table { width:100%; border-collapse:separate; border-spacing:0; }
.schedule-table th { background:var(--surface); border-bottom:2px solid var(--border); padding:8px 6px; text-align:left; font-size:12px; font-weight:600; color:var(--muted); position:sticky; top:57px; white-space:nowrap; }
.schedule-table td { padding:5px 6px; border-bottom:1px solid var(--border); vertical-align:top; min-width:80px; }
.day-cell { display:flex; flex-direction:column; gap:1px; }
.day-num { font-size:12px; font-weight:600; color:var(--muted); white-space:nowrap; }
.day-num.weekend { color:#ff3b30; }
.slot-chip { display:inline-flex; align-items:center; gap:4px; padding:3px 7px; border-radius:5px; font-size:12px; font-weight:500; white-space:nowrap; cursor:pointer; transition:.1s; }
.slot-chip:hover { opacity:.8; }
.slot-chip.empty { background:var(--bg); color:var(--muted); border:1px dashed var(--border); }
.slot-chip.morningInside  { background:#e3f5e1; color:#1b5e20; }
.slot-chip.morningManager { background:#e8f4fd; color:#0d47a1; }
.slot-chip.eveningInside  { background:#fff3e0; color:#e65100; }
.slot-chip.eveningManager { background:#f3e5f5; color:#4a148c; }
.slot-chip.night   { background:#e8eaf6; color:#283593; }
.slot-chip.night2  { background:#e8eaf6; color:#283593; }
.slot-chip.rdm     { background:#e0f2f1; color:#004d40; }
.slot-chip.office  { background:#fce4ec; color:#880e4f; }
.slot-chip.sw      { background:#f1f8e9; color:#33691e; }

/* Day row: weekend highlight */
.schedule-table tr.weekend-row td { background:#fff9f9; }
.schedule-table tr.other-month td { opacity:.4; pointer-events:none; }

/* Edit popup */
.popup-overlay { position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:200; display:none; align-items:center; justify-content:center; }
.popup-overlay.active { display:flex; }
.popup { background:var(--surface); border-radius:var(--radius); padding:20px; min-width:260px; box-shadow:0 8px 30px rgba(0,0,0,.2); }
.popup h4 { margin-bottom:12px; font-size:15px; }
.popup select { width:100%; border:1px solid var(--border); border-radius:7px; padding:8px; font:inherit; margin-bottom:12px; }
.popup-btns { display:flex; gap:8px; justify-content:flex-end; }

/* Legend */
.legend { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
.legend-item { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--muted); }
.legend-dot { width:10px; height:10px; border-radius:3px; }

/* Stats bar */
.stats-bar { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
.stat { background:var(--surface); border-radius:8px; padding:10px 14px; font-size:12px; color:var(--muted); border:1px solid var(--border); }
.stat strong { display:block; font-size:20px; color:var(--primary); font-weight:700; }

/* Spinner */
#spinner { display:none; position:fixed; inset:0; background:rgba(255,255,255,.7); z-index:300; align-items:center; justify-content:center; flex-direction:column; gap:12px; }
#spinner.active { display:flex; }
.spin { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Toast */
#toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#1d1d1f; color:#fff; padding:10px 20px; border-radius:20px; font-size:13px; z-index:400; opacity:0; transition:.3s; pointer-events:none; }
#toast.show { opacity:1; }
</style>
</head>
<body>

<div class="topbar">
  <h1>📋 Расписание ПБО</h1>
  <select id="monthSel">
    <option value="1">Январь</option><option value="2">Февраль</option>
    <option value="3">Март</option><option value="4">Апрель</option>
    <option value="5">Май</option><option value="6">Июнь</option>
    <option value="7">Июль</option><option value="8">Август</option>
    <option value="9">Сентябрь</option><option value="10">Октябрь</option>
    <option value="11">Ноябрь</option><option value="12">Декабрь</option>
  </select>
  <select id="yearSel"></select>
  <button class="btn btn-primary" id="genBtn">⚡ Генерировать</button>
  <button class="btn btn-secondary" id="loadBtn">📥 Загрузить</button>
  <button class="btn btn-secondary" id="exportBtn">📤 CSV</button>
  <span id="status"></span>
</div>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">

    <div class="section">
      <h3>Сотрудники</h3>
      <div class="emp-list" id="empList"></div>
      <div class="add-form" style="margin-top:10px;">
        <input id="newName" placeholder="Имя" />
        <select id="newLevel">
          <option value="level6">Директор (level6)</option>
          <option value="level5">Нач. отдела (level5)</option>
          <option value="level4">Ассистент (level4)</option>
          <option value="level3" selected>Менеджер (level3)</option>
        </select>
        <select id="newCanInside">
          <option value="false">canInside: нет</option>
          <option value="true">canInside: да</option>
        </select>
        <button class="btn btn-secondary btn-sm" id="addEmpBtn">+ Добавить</button>
      </div>
    </div>

    <div class="section">
      <h3>Заявки на выходные</h3>
      <div class="req-form">
        <select id="reqEmp"></select>
        <input type="date" id="reqDate" />
        <select id="reqType">
          <option value="off">Выходной</option>
          <option value="vacation">Отпуск</option>
        </select>
        <button class="btn btn-secondary btn-sm" id="addReqBtn">+ Добавить</button>
      </div>
      <div class="req-list" id="reqList"></div>
    </div>

    <div class="section">
      <button class="btn btn-danger btn-sm" style="width:100%" id="resetBtn">🗑 Сбросить всё</button>
    </div>

  </div>

  <!-- Main content -->
  <div class="content">

    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:#e3f5e1;border:1px solid #a5d6a7"></span>Утро Inside</div>
      <div class="legend-item"><span class="legend-dot" style="background:#e8f4fd;border:1px solid #90caf9"></span>Утро Manager</div>
      <div class="legend-item"><span class="legend-dot" style="background:#fff3e0;border:1px solid #ffcc80"></span>Вечер Inside</div>
      <div class="legend-item"><span class="legend-dot" style="background:#f3e5f5;border:1px solid #ce93d8"></span>Вечер Manager</div>
      <div class="legend-item"><span class="legend-dot" style="background:#e8eaf6;border:1px solid #9fa8da"></span>Ночь</div>
      <div class="legend-item"><span class="legend-dot" style="background:#e0f2f1;border:1px solid #80cbc4"></span>RDM</div>
      <div class="legend-item"><span class="legend-dot" style="background:#fce4ec;border:1px solid #f48fb1"></span>Офис</div>
      <div class="legend-item"><span class="legend-dot" style="background:#f1f8e9;border:1px solid #c5e1a5"></span>SW</div>
    </div>

    <div class="stats-bar" id="statsBar"></div>

    <div class="schedule-wrap">
      <table class="schedule-table" id="schedTable">
        <thead>
          <tr>
            <th>День</th>
            <th>Утро<br>Inside</th>
            <th>Утро<br>Manager</th>
            <th>Вечер<br>Inside</th>
            <th>Вечер<br>Manager</th>
            <th>Ночь 1</th>
            <th>Ночь 2</th>
            <th>RDM</th>
            <th>Офис</th>
            <th>SW</th>
          </tr>
        </thead>
        <tbody id="schedBody"></tbody>
      </table>
    </div>

  </div>
</div>

<!-- Edit popup -->
<div class="popup-overlay" id="popup">
  <div class="popup">
    <h4 id="popupTitle">Изменить слот</h4>
    <select id="popupSel"></select>
    <div class="popup-btns">
      <button class="btn btn-secondary" id="popupCancel">Отмена</button>
      <button class="btn btn-primary" id="popupSave">Сохранить</button>
    </div>
  </div>
</div>

<!-- Spinner -->
<div id="spinner"><div class="spin"></div><span>Генерация расписания...</span></div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
const SLOTS = ['morningInside','morningManager','eveningInside','eveningManager',
               'night','night2','rdm','office','sw'];
const SLOT_LABELS = {
  morningInside:'Утро Inside', morningManager:'Утро Manager',
  eveningInside:'Вечер Inside', eveningManager:'Вечер Manager',
  night:'Ночь 1', night2:'Ночь 2', rdm:'RDM', office:'Офис', sw:'SW'
};
const DAYS_RU = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];

let employees = [];
let requests   = {};  // { empName: { "2025-12-01": "off" } }
let schedule   = {};  // { "2025-12-01": { morningInside: "...", ... } }

let editCtx = null;   // { dateStr, slot }

// ── Init ─────────────────────────────────────────────────────────────────────
const now = new Date();
document.getElementById('monthSel').value = now.getMonth() + 1;
const yearSel = document.getElementById('yearSel');
for (let y = now.getFullYear() - 1; y <= now.getFullYear() + 2; y++) {
  const o = document.createElement('option');
  o.value = y; o.textContent = y;
  if (y === now.getFullYear()) o.selected = true;
  yearSel.appendChild(o);
}

// ── API helpers ──────────────────────────────────────────────────────────────
async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== null) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

function toast(msg, color = '#1d1d1f') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }
function spinner(on) { document.getElementById('spinner').classList.toggle('active', on); }

// ── Load all data ────────────────────────────────────────────────────────────
async function loadAll() {
  try {
    employees = await api('/api/employees');
    requests  = await api('/api/requests');
    const y = +yearSel.value, m = +document.getElementById('monthSel').value;
    const saved = await api(`/api/schedule?year=${y}&month=${m}`);
    schedule = saved || {};
    renderAll();
    setStatus('Загружено');
  } catch(e) { toast('Ошибка загрузки: ' + e.message, '#ff3b30'); }
}

// ── Generate ──────────────────────────────────────────────────────────────────
document.getElementById('genBtn').addEventListener('click', async () => {
  spinner(true);
  setStatus('Генерация...');
  try {
    const y = +yearSel.value, m = +document.getElementById('monthSel').value;
    schedule = await api('/api/generate', 'POST', { year: y, month: m });
    renderSchedule();
    renderStats();
    setStatus('Готово ✓');
    toast('Расписание сгенерировано!', '#34C759');
  } catch(e) {
    toast('Ошибка: ' + e.message, '#ff3b30');
    setStatus('Ошибка');
  } finally { spinner(false); }
});

document.getElementById('loadBtn').addEventListener('click', loadAll);

// ── Employees ─────────────────────────────────────────────────────────────────
function renderEmployees() {
  const list = document.getElementById('empList');
  list.innerHTML = '';
  // Сортируем: level6 → level5 → level4 → level3
  const order = { level6:0, level5:1, level4:2, level3:3, level2:4 };
  const sorted = [...employees].sort((a,b) => (order[a.level]||9) - (order[b.level]||9));
  sorted.forEach(emp => {
    const div = document.createElement('div');
    div.className = 'emp-item';
    div.innerHTML = `
      <span class="emp-badge ${emp.level}"></span>
      <span class="emp-name">${emp.name}</span>
      <span class="emp-level">${emp.level}${emp.canInside ? ' ◆' : ''}</span>
      <button class="emp-del" data-id="${emp.id}" title="Удалить">×</button>`;
    list.appendChild(div);
  });
  list.querySelectorAll('.emp-del').forEach(btn =>
    btn.addEventListener('click', () => deleteEmployee(btn.dataset.id))
  );
  // Обновляем селект заявок
  const reqEmpSel = document.getElementById('reqEmp');
  reqEmpSel.innerHTML = '';
  employees.forEach(emp => {
    const o = document.createElement('option');
    o.value = emp.name; o.textContent = emp.name;
    reqEmpSel.appendChild(o);
  });
}

document.getElementById('addEmpBtn').addEventListener('click', async () => {
  const name = document.getElementById('newName').value.trim();
  const level = document.getElementById('newLevel').value;
  const canInside = document.getElementById('newCanInside').value === 'true';
  if (!name) return toast('Введите имя');
  try {
    const emp = await api('/api/employees', 'POST', { name, level, canInside });
    employees.push(emp);
    renderEmployees();
    document.getElementById('newName').value = '';
  } catch(e) { toast('Ошибка: ' + e.message, '#ff3b30'); }
});

async function deleteEmployee(id) {
  if (!confirm('Удалить сотрудника?')) return;
  try {
    await api(`/api/employees/${id}`, 'DELETE');
    employees = employees.filter(e => e.id !== id);
    renderEmployees();
  } catch(e) { toast('Ошибка: ' + e.message, '#ff3b30'); }
}

// ── Requests ──────────────────────────────────────────────────────────────────
function renderRequests() {
  const list = document.getElementById('reqList');
  list.innerHTML = '';
  Object.entries(requests).forEach(([empName, dates]) => {
    Object.entries(dates).forEach(([dateStr, type]) => {
      const div = document.createElement('div');
      div.className = 'req-item';
      div.innerHTML = `
        <span>${empName}</span>
        <span>${dateStr}</span>
        <span class="req-tag ${type}">${type === 'off' ? 'Выходной' : 'Отпуск'}</span>
        <button class="req-del" data-emp="${empName}" data-date="${dateStr}">×</button>`;
      list.appendChild(div);
    });
  });
  list.querySelectorAll('.req-del').forEach(btn =>
    btn.addEventListener('click', () => deleteRequest(btn.dataset.emp, btn.dataset.date))
  );
}

document.getElementById('addReqBtn').addEventListener('click', async () => {
  const emp = document.getElementById('reqEmp').value;
  const date = document.getElementById('reqDate').value;
  const type = document.getElementById('reqType').value;
  if (!emp || !date) return toast('Выберите сотрудника и дату');
  try {
    await api('/api/requests', 'POST', { emp_name: emp, date, type });
    if (!requests[emp]) requests[emp] = {};
    requests[emp][date] = type;
    renderRequests();
  } catch(e) { toast('Ошибка: ' + e.message, '#ff3b30'); }
});

async function deleteRequest(empName, dateStr) {
  try {
    await api('/api/requests', 'POST', { emp_name: empName, date: dateStr, type: null });
    delete requests[empName][dateStr];
    renderRequests();
  } catch(e) { toast('Ошибка: ' + e.message, '#ff3b30'); }
}

// ── Schedule grid ─────────────────────────────────────────────────────────────
function buildMonthDays(year, month) {
  const days = [];
  const first = new Date(year, month - 1, 1);
  const last  = new Date(year, month, 0);
  // Заполняем с понедельника первой недели до воскресенья последней
  const start = new Date(first);
  start.setDate(start.getDate() - ((start.getDay() + 6) % 7));
  const end = new Date(last);
  end.setDate(end.getDate() + ((7 - end.getDay()) % 7 || 7));
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    days.push(new Date(d));
  }
  return days;
}

function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function renderSchedule() {
  const y = +yearSel.value, m = +document.getElementById('monthSel').value;
  const days = buildMonthDays(y, m);
  const tbody = document.getElementById('schedBody');
  tbody.innerHTML = '';

  days.forEach(d => {
    const ds = dateStr(d);
    const isCurrentMonth = d.getMonth() + 1 === m;
    const isWeekend = d.getDay() === 0 || d.getDay() === 6;
    const row = document.createElement('tr');
    if (isWeekend) row.classList.add('weekend-row');
    if (!isCurrentMonth) row.classList.add('other-month');

    // Day cell
    const dayTd = document.createElement('td');
    dayTd.innerHTML = `<div class="day-cell">
      <span class="day-num${isWeekend ? ' weekend' : ''}">${DAYS_RU[d.getDay()]} ${d.getDate()}</span>
    </div>`;
    row.appendChild(dayTd);

    // Slot cells
    const dayData = schedule[ds] || {};
    SLOTS.forEach(slot => {
      const td = document.createElement('td');
      const val = dayData[slot] || '';
      const chip = document.createElement('span');
      chip.className = `slot-chip ${val ? slot : 'empty'}`;
      chip.textContent = val || '—';
      if (isCurrentMonth) {
        chip.title = `${ds} / ${SLOT_LABELS[slot]}`;
        chip.addEventListener('click', () => openEdit(ds, slot, val));
      }
      td.appendChild(chip);
      row.appendChild(td);
    });

    tbody.appendChild(row);
  });
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function renderStats() {
  const y = +yearSel.value, m = +document.getElementById('monthSel').value;
  const counts = {};
  employees.forEach(e => counts[e.name] = 0);

  Object.entries(schedule).forEach(([ds, slots]) => {
    const d = new Date(ds);
    if (d.getMonth() + 1 !== m) return;
    SLOTS.forEach(slot => {
      const name = slots[slot];
      if (name) counts[name] = (counts[name] || 0) + 1;
    });
  });

  const bar = document.getElementById('statsBar');
  bar.innerHTML = '';
  employees.forEach(emp => {
    const div = document.createElement('div');
    div.className = 'stat';
    div.innerHTML = `<strong>${counts[emp.name] || 0}</strong>${emp.name}`;
    bar.appendChild(div);
  });
}

// ── Edit popup ────────────────────────────────────────────────────────────────
function openEdit(ds, slot, current) {
  editCtx = { ds, slot };
  document.getElementById('popupTitle').textContent = `${ds} · ${SLOT_LABELS[slot]}`;
  const sel = document.getElementById('popupSel');
  sel.innerHTML = '<option value="">— пусто —</option>';
  employees.forEach(emp => {
    const o = document.createElement('option');
    o.value = emp.name;
    o.textContent = `${emp.name} (${emp.level})`;
    if (emp.name === current) o.selected = true;
    sel.appendChild(o);
  });
  document.getElementById('popup').classList.add('active');
}

document.getElementById('popupCancel').addEventListener('click', () => {
  document.getElementById('popup').classList.remove('active');
});

document.getElementById('popupSave').addEventListener('click', async () => {
  if (!editCtx) return;
  const { ds, slot } = editCtx;
  const val = document.getElementById('popupSel').value;
  const y = +yearSel.value, m = +document.getElementById('monthSel').value;
  try {
    await api('/api/schedule/slot', 'PUT', { year: y, month: m, date_str: ds, slot, value: val });
    if (!schedule[ds]) schedule[ds] = {};
    schedule[ds][slot] = val;
    renderSchedule();
    renderStats();
    document.getElementById('popup').classList.remove('active');
  } catch(e) { toast('Ошибка: ' + e.message, '#ff3b30'); }
});

document.getElementById('popup').addEventListener('click', e => {
  if (e.target === document.getElementById('popup'))
    document.getElementById('popup').classList.remove('active');
});

// ── Export CSV ────────────────────────────────────────────────────────────────
document.getElementById('exportBtn').addEventListener('click', () => {
  const y = +yearSel.value, m = +document.getElementById('monthSel').value;
  const days = buildMonthDays(y, m).filter(d => d.getMonth() + 1 === m);
  const header = ['Дата', 'День', ...SLOTS.map(s => SLOT_LABELS[s])].join(',');
  const rows = days.map(d => {
    const ds = dateStr(d);
    const slots = schedule[ds] || {};
    return [ds, DAYS_RU[d.getDay()], ...SLOTS.map(s => slots[s] || '')].join(',');
  });
  const csv = [header, ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent('﻿' + csv);
  a.download = `schedule_${y}_${m}.csv`;
  a.click();
});

// ── Reset ─────────────────────────────────────────────────────────────────────
document.getElementById('resetBtn').addEventListener('click', async () => {
  if (!confirm('Сбросить всех сотрудников и расписание?')) return;
  try {
    await api('/api/reset', 'POST');
    await loadAll();
    toast('Сброшено', '#FF9500');
  } catch(e) { toast('Ошибка: ' + e.message, '#ff3b30'); }
});

// ── Month/year change ─────────────────────────────────────────────────────────
async function onPeriodChange() {
  const y = +yearSel.value, m = +document.getElementById('monthSel').value;
  try {
    const saved = await api(`/api/schedule?year=${y}&month=${m}`);
    schedule = saved || {};
    renderSchedule();
    renderStats();
    setStatus('Загружено');
  } catch(e) { toast('Ошибка загрузки расписания', '#ff3b30'); }
}
document.getElementById('monthSel').addEventListener('change', onPeriodChange);
yearSel.addEventListener('change', onPeriodChange);

// ── renderAll ──────────────────────────────────────────────────────────────────
function renderAll() {
  renderEmployees();
  renderRequests();
  renderSchedule();
  renderStats();
}

// ── Startup ───────────────────────────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
